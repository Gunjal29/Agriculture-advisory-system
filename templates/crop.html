<!DOCTYPE html>
<html>

<head>

<title>Crop Recommendation</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

<h2 class="text-center mb-4">Crop Recommendation</h2>

<div class="card shadow p-4">

<form action="/recommend" method="POST">

<label class="mb-2">Select Soil Type</label>

<select name="soil" class="form-control mb-3">

<option value="Black">Black Soil</option>
<option value="Red">Red Soil</option>
<option value="Sandy">Sandy Soil</option>
<option value="Laterite">Laterite Soil</option>

</select>

<label class="mb-2">Select District</label>

<select name="location" class="form-control mb-3">

<option>Pune</option>
<option>Mumbai</option>
<option>Nashik</option>
<option>Kolhapur</option>
<option>Nagpur</option>
<option>Aurangabad</option>
<option>Solapur</option>

</select>

<button class="btn btn-success w-100">

Get Recommendation

</button>

</form>

</div>

</div>

</body>

</html>
