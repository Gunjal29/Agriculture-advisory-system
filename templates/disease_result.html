<!DOCTYPE html>
<html>

<head>
<title>Disease Detection Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

<h2 class="text-center text-success mb-4">🌿 Plant Disease Detection</h2>

<div class="card shadow p-4 text-center">

<h4 class="mb-3">Detected Disease</h4>

<h3 class="text-danger">{{disease}}</h3>

<hr>

<h4 class="mt-3">Recommended Cure</h4>

<p class="lead">{{cure}}</p>

<hr>

<h4>Uploaded Image</h4>

<img src="/{{image}}" class="img-fluid rounded" style="max-width:400px">

<br><br>

<a href="/dashboard" class="btn btn-success">Back to Dashboard</a>

</div>

</div>

</body>

</html>
