<!DOCTYPE html>
<html>

<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

{% include 'navbar.html' %}

<div class="container mt-5">

<h2 class="text-center text-success mb-5 fw-bold">
🌾 Welcome {{username}}
</h2>

<div class="row g-4 align-items-stretch">

<!-- 🌱 Crop Recommendation -->
<div class="col-md-4">
<div class="card shadow h-100 d-flex flex-column justify-content-between text-center p-4">

<div>
<h4 class="mb-2">🌱 Crop Recommendation</h4>
<p class="text-muted">Find best crops for your soil</p>
</div>

<a href="/crop" class="btn btn-success mt-3">Open</a>

</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4 h-100 text-center">

<h4 class="mb-3">🤖 Farmer AI Assistant</h4>

<form action="/chatbot" method="POST">
<input type="text" name="question" class="form-control mb-3" placeholder="Ask farming question..." required>
<button class="btn btn-success w-100">Ask</button>
</form>

{% if reply %}
<div class="mt-4 p-3 answer-box text-start">
<strong>Answer:</strong><br><br>
<div style="white-space: pre-line;">
{{ reply }}
</div>
</div>
{% endif %}

</div>
</div>

<!-- 🌿 Disease Detector -->
<div class="col-md-4">
<div class="card shadow h-100 d-flex flex-column justify-content-between text-center p-4">

<div>
<h4 class="mb-3">🌿 Plant Disease Detector</h4>
</div>

<form action="/detect" method="POST" enctype="multipart/form-data">
<input type="file" name="image" class="form-control mb-3" required>
<button class="btn btn-success w-100">Detect Disease</button>
</form>

</div>
</div>

</div>
</div>

</body>
</html>
